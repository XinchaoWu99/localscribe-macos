    <path d="M192 336C218 336 222 236 248 236C274 236 278 390 304 390C330 390 334 206 360 206C386 206 390 432 416 432C442 432 446 288 472 288" stroke="url(#wave)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="182" y="154" width="118" height="22" rx="11" fill="#F5D9AA" fill-opacity="0.88"/>
    <rect x="182" y="460" width="168" height="22" rx="11" fill="#F7F1E7" fill-opacity="0.84"/>
    <rect x="376" y="154" width="84" height="22" rx="11" fill="#F7F1E7" fill-opacity="0.68"/>
    <rect x="390" y="460" width="70" height="22" rx="11" fill="#F5D9AA" fill-opacity="0.76"/>
